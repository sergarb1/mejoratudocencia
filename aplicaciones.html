<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aplicaciones Educativas - Mejora tu Docencia</title>
  <script src="https://unpkg.com/vue@3.4.15/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/lucide@0.321.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <script src="js/config.js"></script>
  <script src="js/components.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            outfit: ['Outfit', 'sans-serif'],
          },
          colors: {
            primary: {
              50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80',
              500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d',
            }
          }
        }
      }
    }
  </script>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet" />
  <style>
    [v-cloak] { display: none; }
    body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
    h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 50%, #f0fdf4 100%); }
    .glass-effect { background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
    .card { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); border: 1px solid rgba(226,232,240,0.8); }
    .card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05); border-color: #bbf7d0; }
    .list-enter-active, .list-leave-active { transition: all 0.3s ease; }
    .list-enter-from, .list-leave-to { opacity: 0; transform: scale(0.95); }
    .list-move { transition: transform 0.3s ease; }
  </style>
</head>
<body class="gradient-bg text-gray-800 min-h-screen flex flex-col">
  <div id="app" v-cloak class="flex flex-col flex-grow">
    <site-header active-page="aplicaciones.html"></site-header>

    <main class="flex-grow max-w-7xl mx-auto w-full p-3 md:p-6 space-y-3 md:space-y-4 mt-3 md:mt-4">
      <div class="text-center space-y-1.5 md:space-y-2 max-w-3xl mx-auto">
        <div class="inline-flex p-2 md:p-2.5 bg-primary-100 text-primary-600 rounded-xl mb-1 md:mb-2 shadow-inner">
          <i data-lucide="rocket" class="w-4 md:w-5 h-4 md:h-5"></i>
        </div>
        <h2 class="text-xl md:text-3xl font-black text-slate-900 leading-tight tracking-tight">Aplicaciones Educativas</h2>
        <p class="text-[10px] md:text-sm text-slate-500 font-medium">Apps creadas por la comunidad <strong>Mejora tu Docencia</strong>. Código abierto, gratuitas.</p>
        <p class="text-[9px] md:text-[11px] text-slate-400">Apps externas en <a href="recursos.html" class="text-primary-600 font-bold hover:underline">Recursos</a>.</p>
      </div>

      <section class="glass-effect p-3 md:p-4 rounded-xl md:rounded-2xl shadow-sm sticky top-0 z-40">
        <div class="flex flex-col sm:grid sm:grid-cols-2 gap-2 md:gap-3">
          <div class="relative">
            <label class="flex items-center gap-1 text-[8px] md:text-[9px] font-bold text-primary-600 mb-0.5 md:mb-1 ml-1 uppercase tracking-widest">
              <i data-lucide="search" class="w-2 md:w-2.5 h-2 md:h-2.5"></i> Búsqueda
            </label>
            <div class="relative">
              <input v-model="search" type="text" placeholder="Filtrar..." class="w-full pl-7 md:pl-8 p-1.5 md:p-2 bg-white/50 border border-gray-200 rounded-lg md:rounded-xl focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 focus:outline-none text-[10px] md:text-[11px] transition-all" />
              <span class="absolute left-2 md:left-2.5 top-1/2 -translate-y-1/2 text-gray-400"><i data-lucide="search" class="w-3 md:w-3.5 h-3 md:h-3.5"></i></span>
            </div>
          </div>
          <div>
            <label class="flex items-center gap-1 text-[8px] md:text-[9px] font-bold text-primary-600 mb-0.5 md:mb-1 ml-1 uppercase tracking-widest">
              <i data-lucide="filter" class="w-2 md:w-2.5 h-2 md:h-2.5"></i> Categoría
            </label>
            <select v-model="selectedTag" class="w-full p-1.5 md:p-2 bg-white/50 border border-gray-200 rounded-lg md:rounded-xl focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 focus:outline-none text-[10px] md:text-[11px] transition-all cursor-pointer">
              <option value="">Todas</option>
              <option v-for="t in availableTags" :key="t" :value="t">{{ t }}</option>
            </select>
          </div>
        </div>
        <div class="mt-2 md:mt-3 flex justify-center items-center gap-2 md:gap-4">
          <span v-if="loading" class="flex items-center gap-1.5 text-[8px] md:text-[9px] text-primary-600 font-bold animate-pulse">
            <i data-lucide="refresh-cw" class="w-2.5 md:w-3 h-2.5 md:h-3 animate-spin"></i> CARGANDO...
          </span>
          <span v-else class="px-2 md:px-2.5 py-0.5 bg-primary-50 text-primary-700 rounded-full text-[8px] md:text-[9px] font-bold shadow-sm border border-primary-100 flex items-center gap-1">
            <i data-lucide="rocket" class="w-2 md:w-2.5 h-2 md:h-2.5"></i> {{ filteredApps.length }} apps
          </span>
          <button v-if="search || selectedTag" @click="resetFilters" class="text-[8px] md:text-[9px] font-bold text-red-500 hover:text-red-700 uppercase flex items-center gap-1">
            <i data-lucide="x-circle" class="w-2.5 md:w-3 h-2.5 md:h-3"></i> Limpiar
          </button>
        </div>
      </section>

      <transition-group name="list" tag="section" class="grid gap-3 md:gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3">
        <article v-for="app in filteredApps" :key="app.Título"
          class="card bg-white rounded-xl md:rounded-2xl p-3 md:p-4 flex flex-col h-full relative group border border-gray-100 overflow-hidden">
          <div class="absolute top-0 left-0 w-0.5 md:w-1 h-full bg-primary-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>

          <div class="mb-1.5 md:mb-2">
            <div class="flex items-center justify-between mb-1.5 md:mb-2">
              <span class="text-[6px] md:text-[7px] font-bold bg-primary-50 text-primary-600 px-1 md:px-1.5 py-0.5 rounded-sm border border-primary-100 uppercase">
                {{ app.Etiquetas[0] }}
              </span>
              <div class="text-gray-300 group-hover:text-primary-500 transition-colors">
                <i :data-lucide="app.Icono" class="w-3.5 md:w-4 h-3.5 md:h-4"></i>
              </div>
            </div>
            <h3 class="font-bold text-[10px] md:text-xs text-gray-900 mb-0.5 md:mb-1 leading-tight group-hover:text-primary-700 transition-colors">{{ app.Título }}</h3>
            <p class="text-gray-500 text-[9px] md:text-[10px] leading-relaxed line-clamp-2 md:line-clamp-3">{{ app.Descripción }}</p>
          </div>

          <div class="mt-auto pt-1.5 md:pt-2 border-t border-gray-50 flex gap-1.5 md:gap-2">
            <a :href="app.URL" target="_blank"
              class="flex-1 bg-primary-600 text-white px-2 md:px-3 py-1.5 md:py-2 rounded-lg font-bold text-[9px] md:text-[11px] shadow-sm shadow-primary-200 hover:bg-primary-700 transition-all inline-flex items-center justify-center gap-1 md:gap-1.5">
              <i data-lucide="external-link" class="w-2.5 md:w-3 h-2.5 md:h-3"></i> App
            </a>
            <a v-if="app.GitHub" :href="app.GitHub" target="_blank"
              class="flex-1 bg-gray-600 text-white px-2 md:px-3 py-1.5 md:py-2 rounded-lg font-bold text-[9px] md:text-[11px] shadow-sm shadow-gray-200 hover:bg-gray-700 transition-all inline-flex items-center justify-center gap-1 md:gap-1.5">
              <i data-lucide="code" class="w-2.5 md:w-3 h-2.5 md:h-3"></i> Código
            </a>
          </div>
        </article>
      </transition-group>

      <div v-if="!loading && !filteredApps.length" class="text-center py-10 md:py-16 bg-white/50 rounded-xl md:rounded-[2rem] border border-dashed border-gray-300">
        <div class="inline-flex p-3 bg-gray-100 rounded-full mb-3">
          <i data-lucide="search-x" class="w-6 h-6 text-gray-400"></i>
        </div>
        <p class="text-xs text-gray-500 font-medium">No se han encontrado aplicaciones.</p>
        <button @click="resetFilters" class="mt-2 text-[10px] text-primary-600 font-bold hover:underline uppercase">Ver todas</button>
      </div>
    </main>

    <site-footer></site-footer>
  </div>

  <script>
    const { createApp, ref, computed, onMounted, nextTick } = Vue;

    createApp({
      components: { SiteHeader, SiteFooter },
      setup() {
        const apps = ref([]);
        const loading = ref(true);
        const search = ref('');
        const selectedTag = ref('');

        const availableTags = computed(() => {
          const tags = [...new Set(apps.value.flatMap(a => a.Etiquetas || []).filter(Boolean))];
          return tags.sort();
        });

        const filteredApps = computed(() => {
          const text = search.value.toLowerCase();
          return apps.value.filter(a => {
            const byText = !text || a.Título?.toLowerCase().includes(text) || a.Descripción?.toLowerCase().includes(text) || (a.Etiquetas || []).some(t => t.toLowerCase().includes(text));
            const byTag = !selectedTag.value || (a.Etiquetas || []).includes(selectedTag.value);
            return byText && byTag;
          });
        });

        const resetFilters = () => {
          search.value = '';
          selectedTag.value = '';
        };

        onMounted(async () => {
          try {
            const res = await fetch('aplicaciones.json');
            apps.value = await res.json();
          } catch (e) {
            console.error('Error loading aplicaciones:', e);
          } finally {
            loading.value = false;
            nextTick(() => lucide.createIcons());
          }
        });

        return { loading, search, selectedTag, availableTags, filteredApps, resetFilters };
      }
    }).mount("#app");
  </script>
</body>
</html>
