<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recursos - Mejora tu Docencia</title>
  <script src="https://unpkg.com/vue@3.4.15/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/lucide@0.321.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <script src="js/config.js"></script>
  <script src="js/components.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            outfit: ['Outfit', 'sans-serif'],
          },
          colors: {
            primary: {
              50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80',
              500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d',
            }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet" />
  <style>
    [v-cloak] { display: none; }
    body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
    h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 50%, #f0fdf4 100%); }
    .glass-effect { background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
    .card { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); border: 1px solid rgba(226,232,240,0.8); }
    .card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05); border-color: #bbf7d0; }
    .list-enter-active, .list-leave-active { transition: all 0.3s ease; }
    .list-enter-from, .list-leave-to { opacity: 0; transform: scale(0.95); }
    .list-move { transition: transform 0.3s ease; }
  </style>
</head>
<body class="gradient-bg text-gray-800 min-h-screen flex flex-col">
  <div id="app" v-cloak class="flex flex-col flex-grow">
    <site-header active-page="recursos.html"></site-header>

    <main class="flex-grow max-w-7xl mx-auto w-full p-4 md:p-6 space-y-4 mt-4">
      <section class="glass-effect p-4 rounded-2xl shadow-sm sticky top-0 z-40">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
          <div class="relative">
            <label class="flex items-center gap-1.5 text-[9px] font-bold text-primary-600 mb-1 ml-1 uppercase tracking-widest">
              <i data-lucide="search" class="w-2.5 h-2.5"></i> Búsqueda
            </label>
            <div class="relative">
              <input v-model="search" type="text" placeholder="Filtrar por nombre..." class="w-full pl-8 p-2 bg-white/50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 focus:outline-none text-[11px] transition-all" />
              <span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400"><i data-lucide="search" class="w-3.5 h-3.5"></i></span>
            </div>
          </div>
          <div>
            <label class="flex items-center gap-1.5 text-[9px] font-bold text-primary-600 mb-1 ml-1 uppercase tracking-widest">
              <i data-lucide="layers" class="w-2.5 h-2.5"></i> Área
            </label>
            <select v-model="selectedSection" class="w-full p-2 bg-white/50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 focus:outline-none text-[11px] transition-all cursor-pointer">
              <option value="">Todas las áreas</option>
              <option v-for="s in config.sections" :key="s.id" :value="s.id">{{ s.name }}</option>
            </select>
          </div>
          <div>
            <label class="flex items-center gap-1.5 text-[9px] font-bold text-primary-600 mb-1 ml-1 uppercase tracking-widest">
              <i data-lucide="filter" class="w-2.5 h-2.5"></i> Tipo
            </label>
            <select v-model="selectedType" class="w-full p-2 bg-white/50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 focus:outline-none text-[11px] transition-all cursor-pointer">
              <option value="">Cualquier tipo</option>
              <option v-for="t in availableTypes" :key="t" :value="t">{{ t }}</option>
            </select>
          </div>
        </div>
        <div class="mt-3 flex justify-center items-center gap-4">
          <span class="px-2.5 py-0.5 bg-primary-50 text-primary-700 rounded-full text-[9px] font-bold shadow-sm border border-primary-100 flex items-center gap-1">
            <i data-lucide="database" class="w-2.5 h-2.5"></i> {{ filteredResources.length }} recursos
          </span>
          <button v-if="search || selectedSection || selectedType" @click="resetFilters" class="text-[9px] font-bold text-red-500 hover:text-red-700 uppercase flex items-center gap-1">
            <i data-lucide="x-circle" class="w-2.5 h-2.5"></i> Limpiar
          </button>
        </div>
      </section>

      <transition-group name="list" tag="section" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
        <article v-for="r in filteredResources" :key="r.Título"
          class="card bg-white rounded-2xl p-4 flex flex-col h-full relative group border border-gray-100 overflow-hidden">
          <div class="absolute top-0 left-0 w-1 h-full bg-primary-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>

          <div class="mb-2">
            <div class="flex items-center justify-between mb-2">
              <span class="text-[7px] font-bold bg-primary-50 text-primary-600 px-1.5 py-0.5 rounded-sm border border-primary-100 uppercase">
                {{ getSectionName(r.Seccion) }}
              </span>
              <div class="text-gray-300 group-hover:text-primary-500 transition-colors">
                <i :data-lucide="getResourceIcon(r.Etiquetas)" class="w-4 h-4"></i>
              </div>
            </div>
            <h3 class="font-bold text-xs text-gray-900 mb-1 leading-tight group-hover:text-primary-700 transition-colors line-clamp-2" :title="r.Título">{{ r.Título }}</h3>
            <p class="text-gray-500 text-[10px] leading-relaxed line-clamp-3">{{ r.Descripción }}</p>
          </div>

          <div class="mt-auto">
            <div class="flex flex-wrap gap-1 mb-2">
              <span v-for="label in getCategoryLabels(r.Etiquetas)" :key="label"
                class="text-[7px] bg-gray-50 text-gray-400 px-1 py-0.5 rounded-sm font-medium border border-gray-100 uppercase tracking-tighter">
                {{ label }}
              </span>
            </div>
            <div class="pt-2 border-t border-gray-50 flex items-center justify-between">
              <span v-if="r.FechaPublicacion" class="text-[8px] text-gray-400 font-semibold flex items-center gap-1">
                <i data-lucide="calendar" class="w-2.5 h-2.5"></i>
                {{ formatFecha(r.FechaPublicacion) }}
              </span>
              <a v-if="r.URL" :href="r.URL" target="_blank"
                class="ml-auto p-1.5 bg-primary-50 text-primary-600 rounded-lg hover:bg-primary-600 hover:text-white transition-all shadow-sm"
                title="Ver recurso">
                <i data-lucide="external-link" class="w-3 h-3"></i>
              </a>
              <span v-else class="ml-auto text-[8px] text-gray-400 italic flex items-center gap-1">
                <i data-lucide="clock" class="w-2.5 h-2.5"></i> Próximamente
              </span>
            </div>
          </div>
        </article>
      </transition-group>

      <div v-if="!loading && !filteredResources.length" class="text-center py-16 bg-white/50 rounded-[2rem] border border-dashed border-gray-300">
        <div class="inline-flex p-3 bg-gray-100 rounded-full mb-3">
          <i data-lucide="search-x" class="w-6 h-6 text-gray-400"></i>
        </div>
        <p class="text-xs text-gray-500 font-medium">No se han encontrado resultados.</p>
        <button @click="resetFilters" class="mt-2 text-[10px] text-primary-600 font-bold hover:underline uppercase">Resetear filtros</button>
      </div>
    </main>

    <site-footer></site-footer>
  </div>

  <script>
    const { createApp, ref, computed, onMounted, nextTick } = Vue;

    const RESOURCE_ICONS = {
      'dinamica': 'heart-handshake', 'guia': 'book-open', 'material': 'file',
      'app': 'rocket', 'estrategia': 'zap', 'pdf': 'file-text',
      'plantilla': 'layout-template', 'manual': 'book', 'tutorial': 'graduation-cap',
      'web': 'globe', 'lista': 'list', 'libro': 'book-open'
    };

    createApp({
      components: { SiteHeader, SiteFooter },
      setup() {
        const config = ref(APP_CONFIG);
        const recursos = ref([]);
        const loading = ref(true);
        const search = ref('');
        const selectedSection = ref('');
        const selectedType = ref('');

        const sectionNames = {};
        config.value.sections.forEach(s => { sectionNames[s.id] = s.name; });

        const getSectionName = (id) => sectionNames[id] || id;

        const getTypeFromTags = (etiquetas) => {
          if (!etiquetas || !etiquetas.length) return '';
          const parts = etiquetas[0].split('-');
          return parts.length > 1 ? parts[1] : '';
        };

        const getCategoryLabels = (etiquetas) => {
          if (!etiquetas) return [];
          return etiquetas.map(t => {
            const parts = t.split('-');
            return parts.length > 1 ? parts.slice(1).join(' ') : t;
          });
        };

        const getResourceIcon = (etiquetas) => {
          const type = getTypeFromTags(etiquetas);
          return RESOURCE_ICONS[type] || 'file';
        };

        const availableTypes = computed(() => {
          let source = recursos.value;
          if (selectedSection.value) {
            source = source.filter(r => r.Seccion === selectedSection.value);
          }
          const types = [...new Set(source.map(r => getTypeFromTags(r.Etiquetas)).filter(Boolean))];
          return types.sort();
        });

        const filteredResources = computed(() => {
          return recursos.value.filter(r => {
            const text = search.value.toLowerCase();
            const byText = !text || r.Título?.toLowerCase().includes(text) || r.Descripción?.toLowerCase().includes(text);
            const bySection = !selectedSection.value || r.Seccion === selectedSection.value;
            const byType = !selectedType.value || getTypeFromTags(r.Etiquetas) === selectedType.value;
            return byText && bySection && byType;
          });
        });

        const formatFecha = (fecha) => {
          if (!fecha) return '';
          const date = new Date(fecha);
          if (isNaN(date.getTime())) return fecha;
          return date.toLocaleDateString('es-ES', { day: '2-digit', month: 'short' });
        };

        const resetFilters = () => {
          search.value = '';
          selectedSection.value = '';
          selectedType.value = '';
        };

        onMounted(async () => {
          try {
            const res = await fetch('recursos.json');
            recursos.value = await res.json();
          } catch (e) {
            console.error('Error loading recursos:', e);
          } finally {
            loading.value = false;
            nextTick(() => lucide.createIcons());
          }
        });

        return { config, loading, search, selectedSection, selectedType, availableTypes, filteredResources, getSectionName, getCategoryLabels, getResourceIcon, formatFecha, resetFilters };
      }
    }).mount('#app');
  </script>
</body>
</html>
