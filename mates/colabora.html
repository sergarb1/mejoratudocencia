<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colabora - El Círculo de las Mates</title>
  <script src="https://unpkg.com/vue@3.4.15/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/lucide@0.321.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <script src="js/config.js"></script>
  <script src="js/components.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    [v-cloak] { display: none; }
    body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
    h1, h2, h3 { font-family: 'Outfit', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #f5f3ff 0%, #ffffff 50%, #f5f3ff 100%); }
  </style>
</head>
<body class="gradient-bg text-gray-800 min-h-screen flex flex-col">
  <div id="app" v-cloak class="flex flex-col flex-grow">
    <site-header active-page="colabora.html"></site-header>

    <main class="flex-grow max-w-3xl mx-auto w-full p-4 md:p-8 space-y-8 mt-12">
      <div class="text-center space-y-4">
        <div class="inline-flex p-4 bg-indigo-100 text-indigo-600 rounded-3xl mb-4">
          <i data-lucide="handshake" class="w-10 h-10"></i>
        </div>
        <h2 class="text-4xl font-black text-gray-900">🤝 Colabora con el Proyecto</h2>
        <p class="text-lg text-gray-600">¿Tienes ideas, recursos o ganas de compartir? ¡Este círculo está abierto a todas las mentes curiosas!</p>
      </div>

      <div class="bg-white p-8 md:p-12 rounded-[3rem] shadow-xl border border-indigo-50 flex flex-col items-center text-center space-y-6">
        <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center">
          <i data-lucide="mail" class="w-8 h-8"></i>
        </div>
        <div class="space-y-2">
          <h3 class="text-2xl font-bold">¡Escríbeme!</h3>
          <p class="text-gray-500">Puedes enviar tus materiales, sugerencias o simplemente saludar.</p>
        </div>
        <a href="mailto:apuntesfpinformatica@gmail.com" class="text-2xl font-black text-indigo-600 hover:underline">contacto@elcirculodelasmates.es</a>
        <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Respondemos en menos de 48 horas</p>
      </div>
    </main>

    <site-footer></site-footer>
  </div>

  <script>
    const { createApp, nextTick } = Vue;
    createApp({
      components: { SiteHeader, SiteFooter },
      setup() {
        return { config: APP_CONFIG };
      },
      mounted() {
        nextTick(() => lucide.createIcons());
      }
    }).mount("#app");
  </script>
</body>
</html>
