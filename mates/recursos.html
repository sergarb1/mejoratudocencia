<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recursos - El Círculo de las Mates</title>
  <script src="https://unpkg.com/vue@3.4.15/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/lucide@0.321.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <script src="js/config.js"></script>
  <script src="js/resources.js"></script>
  <script src="js/components.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    [v-cloak] { display: none; }
    body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
    h1, h2, h3 { font-family: 'Outfit', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #f8fafc 0%, #ffffff 50%, #eff6ff 100%); }
    .card {
      transition: all 0.2s ease-out;
      border: 1px solid rgba(226, 232, 240, 0.8);
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
      border-color: #818cf8;
    }
    .custom-scrollbar::-webkit-scrollbar { height: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body class="gradient-bg text-slate-800 min-h-screen flex flex-col">
  <div id="app" v-cloak class="flex flex-col flex-grow">
    <site-header active-page="recursos.html"></site-header>

    <main class="flex-grow max-w-7xl mx-auto w-full p-4 md:p-8 space-y-8">
      
      <!-- Header Sección -->
      <div class="text-center py-8">
        <h1 class="text-3xl md:text-4xl font-black text-slate-900 mb-3">Banco de Recursos</h1>
        <p class="text-slate-500 max-w-2xl mx-auto">Una selección curada de herramientas digitales, blogs y materiales para enriquecer tus clases de matemáticas.</p>
      </div>

      <!-- Barra de Herramientas (Sticky) -->
      <div class="sticky top-4 z-40 bg-white/90 backdrop-blur-md rounded-2xl shadow-sm border border-slate-200 p-3">
        <div class="flex flex-col md:flex-row gap-4 items-center">
          
          <!-- Buscador -->
          <div class="relative w-full md:w-64 flex-shrink-0">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
            <input 
              v-model="search" 
              type="text" 
              placeholder="Buscar..." 
              class="w-full pl-9 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 focus:outline-none transition-all"
            >
          </div>

          <!-- Separador vertical (solo desktop) -->
          <div class="hidden md:block w-px h-8 bg-slate-200"></div>

          <!-- Filtros (Chips) -->
          <div class="flex-grow w-full overflow-x-auto custom-scrollbar pb-1">
            <div class="flex items-center gap-2">
              <button 
                @click="selectedTag = ''" 
                :class="['px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-all border', 
                         !selectedTag ? 'bg-indigo-600 text-white border-indigo-600 shadow-md shadow-indigo-200' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50']">
                Todos
              </button>
              <button 
                v-for="tag in availableTags" 
                :key="tag"
                @click="selectedTag = tag"
                :class="['px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-all border flex items-center gap-1.5', 
                         selectedTag === tag ? 'bg-indigo-50 text-indigo-700 border-indigo-200 ring-1 ring-indigo-200' : 'bg-white text-slate-600 border-slate-200 hover:border-indigo-300 hover:text-indigo-600']">
                <span>{{ tag }}</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Grid de Recursos -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
        <article 
          v-for="res in filteredResources" 
          :key="res.title"
          class="card bg-white p-5 rounded-2xl flex flex-col group h-full"
        >
          <div class="flex items-start justify-between mb-3">
            <div class="p-2.5 bg-slate-50 text-slate-400 rounded-xl group-hover:bg-indigo-50 group-hover:text-indigo-600 transition-colors">
              <i :data-lucide="getResourceIcon(res.tag)" class="w-5 h-5"></i>
            </div>
            <span class="text-[10px] font-bold px-2 py-1 bg-slate-100 text-slate-500 rounded-md uppercase tracking-wider">{{ res.tag }}</span>
          </div>
          
          <h3 class="font-outfit font-bold text-base text-slate-900 mb-2 leading-tight group-hover:text-indigo-600 transition-colors">{{ res.title }}</h3>
          <p class="text-xs text-slate-500 mb-4 leading-relaxed line-clamp-3 flex-grow">{{ res.description }}</p>
          
          <a :href="res.url" target="_blank" class="mt-auto flex items-center justify-between w-full px-4 py-2 bg-slate-50 text-slate-600 rounded-lg text-xs font-bold hover:bg-indigo-600 hover:text-white transition-all">
            <span>Visitar</span>
            <i data-lucide="external-link" class="w-3 h-3"></i>
          </a>
        </article>
      </div>

      <!-- Empty State -->
      <div v-if="filteredResources.length === 0" class="text-center py-16">
        <div class="inline-flex p-4 bg-slate-100 rounded-full mb-4">
          <i data-lucide="search-x" class="w-8 h-8 text-slate-400"></i>
        </div>
        <p class="text-slate-600 font-medium">No hay recursos que coincidan con la búsqueda.</p>
        <button @click="resetFilters" class="mt-4 text-sm font-bold text-indigo-600 hover:underline">Ver todos los recursos</button>
      </div>

    </main>

    <site-footer></site-footer>
  </div>

  <script>
    const { createApp, ref, computed, onMounted, onUpdated, nextTick } = Vue;

    createApp({
      components: { SiteHeader, SiteFooter },
      setup() {
        const resources = ref(APP_DATA.resources || []);
        const search = ref("");
        const selectedTag = ref("");

        const availableTags = computed(() => {
          return [...new Set(resources.value.map(r => r.tag))].sort();
        });

        const filteredResources = computed(() => {
          return resources.value.filter(r => {
            const matchesSearch = r.title.toLowerCase().includes(search.value.toLowerCase()) || 
                                  r.description.toLowerCase().includes(search.value.toLowerCase());
            const matchesTag = !selectedTag.value || r.tag === selectedTag.value;
            return matchesSearch && matchesTag;
          });
        });

        const getResourceIcon = (tag) => {
          const map = {
            "Interactiva": "mouse-pointer-2",
            "Educativa": "graduation-cap",
            "Visualización": "eye",
            "Lógica": "puzzle",
            "Divulgación": "megaphone",
            "Herramienta": "wrench",
            "Comunidad": "users"
          };
          return map[tag] || "link";
        };

        const resetFilters = () => {
          search.value = "";
          selectedTag.value = "";
        };

        const updateIcons = () => nextTick(() => lucide.createIcons());

        onMounted(updateIcons);
        onUpdated(updateIcons);

        return { 
          search, selectedTag, availableTags, 
          filteredResources, getResourceIcon, resetFilters 
        };
      }
    }).mount("#app");
  </script>
</body>
</html>
