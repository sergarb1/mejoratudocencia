<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyectos - El Círculo de las Mates</title>
  <script src="https://unpkg.com/vue@3.4.15/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/lucide@0.321.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <script src="js/config.js"></script>
  <script src="js/resources.js"></script>
  <script src="js/components.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    [v-cloak] { display: none; }
    body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
    h1, h2, h3 { font-family: 'Outfit', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #f5f3ff 0%, #ffffff 50%, #f5f3ff 100%); }
    .project-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .project-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>
<body class="gradient-bg text-gray-800 min-h-screen flex flex-col">
  <div id="app" v-cloak class="flex flex-col flex-grow">
    <site-header active-page="proyectos.html"></site-header>

    <main class="flex-grow max-w-7xl mx-auto w-full p-4 md:p-8 space-y-12">
      <section class="text-center space-y-4 py-8">
        <h2 class="text-4xl font-black text-gray-900">🧠 Proyectos Educativos</h2>
        <p class="text-lg text-gray-600 max-w-2xl mx-auto">Experiencias que transforman el modo de entender y vivir las matemáticas.</p>
      </section>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div v-for="project in data.projects" :key="project.title" 
          class="project-card bg-white p-8 rounded-[2.5rem] border border-gray-100 flex flex-col gap-4">
          <div class="bg-indigo-50 text-indigo-600 w-12 h-12 rounded-2xl flex items-center justify-center">
            <i :data-lucide="project.icon" class="w-6 h-6"></i>
          </div>
          <h3 class="text-xl font-bold text-gray-900">{{ project.title }}</h3>
          <p class="text-gray-500 text-sm leading-relaxed">{{ project.description }}</p>
        </div>
      </div>
    </main>

    <site-footer></site-footer>
  </div>

  <script>
    const { createApp, nextTick } = Vue;
    createApp({
      components: { SiteHeader, SiteFooter },
      setup() {
        return { data: APP_DATA };
      },
      mounted() {
        nextTick(() => lucide.createIcons());
      }
    }).mount("#app");
  </script>
</body>
</html>
